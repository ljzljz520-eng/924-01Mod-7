version: "3.9"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: mod7-template-web
    ports:
      - "8087:80"
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_NAME=templates_db
      - DB_USER=app_user
      - DB_PASS=app_pass
      - DB_PORT=3306
      - ADMIN_DEFAULT_USER=admin
      - ADMIN_DEFAULT_PASS=admin123
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    restart: unless-stopped

  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: mod7-template-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=templates_db
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=app_pass
    ports:
      - "3377:3306"
    volumes:
      - mod7_db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

volumes:
  mod7_db_data:
